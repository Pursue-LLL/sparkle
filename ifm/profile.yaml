version: 1
name: open-perplexity
extends: preset://generic

options:
- id: 白嫖
  label: 白嫖
  text: 必须防止盗版和白嫖！严禁源码泄漏！
- id: 扩展最稳
  label: 扩展最稳
  text: 1. 直接用最稳最有效的方案，一步到底，避免反复打回调试，浪费我的时间！健壮一点！
        2. 提高稳定性，确保健壮性！如何避免以后再出现这种情况。
        3. 我是cursor老用户的500次套餐，我的终极目标是每个配额都用到极致，不浪费，我想要的目标是最省次数，最持久，连接最不容易断，一次请求做最多事的方案，别给我不要并行之类的不符合我目标的建议和修复方案，别说新开会话减少步骤之类的废话，那样会浪费次数，没有最大化单次请求的收益。开启拦截开关后必须拦截所有全部可能会触发幽灵计次的行为，禁止遗漏。未开启时不拦截，但是必须通知用户发生了幽灵计次。严禁说废话！严禁破坏单次请求的持久性和极限利用率。
        4. 严禁猜测，严禁浅尝辄止，必须使用sequential-thinking深度思考和挖掘证据后再给结论和方案。
      
- id: 扩展说明
  label: 扩展说明
  text: 该项目几点说明，挨个检查和遵循，不要遗漏任何一点：
    1. 必须防止盗版和白嫖！严禁源码和补丁代码泄漏！这是商业扩展。
    2. 订阅后自动应用补丁，当补丁已应用但是未生效时，提示用户重启，用户重启一次即可生效。重启后验证补丁生效后别再提醒用户重启，仅验证未生效时提示用户。
    3. 订阅状态与是否打补丁必须实时同步，当订阅过期或者未订阅时补丁必须被撤销，严禁残留在代码中，被别人白嫖。
    4. toc的产品不要显示技术细节文案，不要把你的开发过程或注释写到toc产品里，你可以写到代码里注释啊，这是面向用户的产品！线上模式尤其不要告诉用户有补丁，对用户来说，它只知道用扩展，扩展内部如何实现不要告诉用户！
    5. 单元测试覆盖率90%，不够请补全，确保没有bug。
    6. 根据code_quality_guidelines规则逐项反思检查和优化代码，不要遗漏，我有代码洁癖； 清理冗余临时文件和代码，保持整洁干净，可读可维护，我有代码高质量、架构、文件目录组织结构完美强迫症！
    7. 本地开发改动扩展时，改完测试完确认没bug后，使用本地模式应用，你应用后我只需重启一次便可生效，不要出现你应用完最新补丁代码，我重启后扩展里还提示让我重启的情况！线上模式从远程获取补丁，本地测试从本地获取并应用。本地测试和线上版本都不要有bug。测试通过后重新安装扩展。
    8. 文档与代码保持一致，每次改动即时更新文档。文档非常重要，避免文档混乱过时、虚假不一致的情况。
    9. 用户如果已经订阅过或激活过，无论更新扩展还是重启等操作都不能让订阅状态丢失，订阅状态不要丢，丢失订阅状态是严重大bug，会引起用户退款和投诉！
    10. 每次改完代码自动进行反思检查测试，每次改完代码自动进行反思检查！以后还会出现这个bug吗？以后还会出现类似bug吗？谨慎一点，健壮一点。
    11. 实施前和每步修改前必须务必先查看目标文件及其相关文件的最新真实代码和其相关文档，永远基于最新真实代码修改，因为别的开发者也在同时修改，你必须读取他们写的最新代码，避免基于旧代码修改导致最近的新功能丢失，也避免改了这块另一块被改坏，确保代码符合预期，别改出bug，不要造成非预期的影响。
    12. 改完了记得更新版本号，别一直用一个分不清。更新版本号后提交代码。重装使用 npm run deploy:dev。
    13. 提高稳定性，如何避免以后再出现这种情况。我是cursor老用户的500次套餐，我的终极目标是每个配额都用到极致，不浪费，我想要的目标是最省次数，最持久，连接最不容易断，一次请求做最多事的方案，别给我不要并行之类的不符合我目标的建议和修复方案，别说新开会话减少步骤之类的废话，那样会浪费次数，没有最大化单次请求的收益。开启拦截开关后必须拦截所有可能会触发幽灵计次的行为，未开启时不拦截，但是必须通知用户发生了幽灵计次。
    14. 严禁猜测，严禁浅尝辄止，必须使用sequential-thinking深度思考和挖掘证据后再给结论和方案。严禁说废话！严禁破坏单次请求的持久性和极限利用率。
